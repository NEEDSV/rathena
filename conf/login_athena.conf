// Athena 로그인 서버 설정 파일
// 번역: Peter Kieser <pfak@telus.net>


// 참고: "주석"은 // 뒤에 있는 모든 텍스트를 의미합니다.
// 주석 처리된 내용은 서버에서 읽지 않으며,
// 단순한 설명/참고 용도로만 사용됩니다.


// 로그인 서버가 바인딩될 IP 주소
// 동일 포트를 사용하면서 여러 인터페이스에 서버를 띄울 수 있습니다.
//bind_ip: 127.0.0.1


// 로그인 서버 포트
login_port: 6900


// 콘솔 메시지 앞에 출력될 시간 포맷
// 최대 20자까지 가능
// 예시:
// %I:%M:%S %p → 12시간제 (AM/PM)
// %H:%M:%S → 24시간제
// %d/%b/%Y → 날짜
// 자세한 내용은 strftime() 참고
//timestamp_format: [%d/%b %H:%M]


// 콘솔 출력에 ANSI 색상 코드 포함 여부
stdout_with_ansisequence: no


// 콘솔 메시지를 파일로 기록할지 설정
// 1: 경고 로그
// 2: 오류 및 SQL 오류 로그
// 4: 디버그 로그
// 예: 7 → 모든 로그 기록
// console_silent보다 우선 적용됨
console_msg_log: 0


// 콘솔 로그 저장 경로
console_log_filepath: ./log/login-msg_log.log


// 콘솔 출력 숨김 설정
// 1: 정보 숨김
// 2: 상태 숨김
// 4: 공지 숨김
// 8: 경고 숨김
// 16: 오류 숨김
// 32: 디버그 숨김
// 예: 7 → 정보/상태/공지 숨김
console_silent: 0


// 콘솔 명령어 사용 여부
// >& log.file 같은 리다이렉션 사용 방지
console: off


// _M/_F 명령어로 계정 생성 허용 여부
// 주의: 클라이언트 측 비밀번호 암호화가 꺼져 있어야 작동
new_account: no


// 계정 생성 시 최소 계정명 길이 설정
// 기본값: 4 또는 6 (로그인 UI에 따라 다름)
// 클라이언트 패치 없으면 변경하지 말 것
//acc_name_min_length: 6


// 계정 생성 시 최소 비밀번호 길이 설정
// 기본값: 4 또는 6
// 클라이언트 패치 없으면 변경하지 말 것
//password_min_length: 6


// 계정 생성 스팸 방지 시스템
// allowed_regs: 허용 횟수
// time_allowed: 시간(초)
allowed_regs: 1
time_allowed: 10


// 로그인 로그 파일 경로
login_log_filename: log/login.log


// 로그인 서버 로그 기록 여부
// 동적 비밀번호 실패 차단 기능에 필요
log_login: yes


// 로그 및 UI에서 사용할 날짜 형식
date_format: %Y-%m-%d %H:%M:%S


// 서버 접속에 필요한 계정 그룹 ID
// -1: 비활성화
// 0 이상: 해당 그룹 이상만 접속 가능
group_id_to_connect: -1


// 최소 접속 가능 그룹 ID
// group_id_to_connect 활성화 시 무시됨
min_group_id_to_connect: -1


// VIP 그룹 ID
vip_group: 5


// 계정당 캐릭터 생성 수 제한
// MAX_CHARS 초과 불가
// 0 → 기본값 사용
chars_per_account: 0


// VIP 계정 추가 캐릭터 슬롯 수
// 0 → 비활성화
// -1 → 기본값 사용
vip_char_increase: -1


// 계정 생성 시 유효 기간 설정
// -1: 무제한
// 0 이상: 해당 초 이후 자동 만료
start_limited_time: -1


// 비밀번호를 MD5 해시로 저장할지 여부
// <passwordencrypt> 클라와는 호환 안됨
use_MD5_passwords: no


// 로그인 창 유저 수 색상 표시 설정
// PACKETVER 20170726 이상 필요
usercount_disable: no
usercount_low: 200
usercount_medium: 500
usercount_high: 1000


// IP 차단 기능 활성화
ipban_enable: yes


// 비밀번호 실패 기반 자동 IP 차단
ipban_dynamic_pass_failure_ban: yes


// 실패 횟수 계산 주기 (분)
ipban_dynamic_pass_failure_ban_interval: 5


// 차단 기준 실패 횟수
ipban_dynamic_pass_failure_ban_limit: 7


// 차단 지속 시간 (분)
ipban_dynamic_pass_failure_ban_duration: 5


// 만료된 IP 차단 정리 주기 (초)
// 0 → 비활성화
ipban_cleanup_interval: 60


// DNS/IP 자동 갱신 주기 (동적 IP 환경)
//ip_sync_interval: 10


// DNS 블랙리스트 차단 기능
// 접속 IP를 블랙리스트와 비교
use_dnsbl: no


// DNS 블랙리스트 서버 목록
dnsbl_servers: bl.blocklist.de, socks.dnsbl.sorbs.net


// 주요 DNS 블랙리스트 설명
// bl.blocklist.de → 공격 IP 리스트
// ircbl.ahbl.org → 프록시/스팸 머신
// safe.dnsbl.sorbs.net → 통합 블랙리스트
// sbl-xbl.spamhaus.org → 스팸/프록시
// socks.dnsbl.sorbs.net → SOCKS 프록시
// tor.ahbl.org → TOR 노드


// 클라이언트 MD5 검증 기능
// 변조 클라이언트 접속 차단
client_hash_check: off


// 웹 인증 토큰 시스템 활성화
// 최신 클라이언트 필수 기능
use_web_auth_token: yes


// 로그아웃 후 토큰 비활성화 지연(ms)
// 클라이언트 설정 저장 문제 방지
disable_webtoken_delay: 10000


// 클라이언트 MD5 허용 목록
// group_id, hash 형식
// disabled → 해시 검사 무시
//client_hash: 0, hash값


// 추가 설정 파일 로드
import: conf/inter_athena.conf
import: conf/import/login_conf.txt