//--------------------------------------------------------------
// rAthena 맵 서버 설정 파일
//--------------------------------------------------------------

// 참고: "주석"은 // 뒤에 있는 모든 텍스트를 의미합니다.
// 주석 처리된 내용은 서버에서 읽지 않으며,
// 단순한 설명/참고 용도로만 사용됩니다.


//--------------------------------------------------------------
//                     설정 정보
//--------------------------------------------------------------

// 인터서버 통신용 계정 정보 (account.txt 등에서 설정)
userid: s1
passwd: p1


// 캐릭터 서버 IP
// 맵 서버가 캐릭터 서버에 접속할 때 사용하는 IP
// 방화벽 환경 또는 멀티 네트워크 환경에서 유용합니다.
char_ip: 127.0.0.1


// 맵 서버 바인딩 IP
// 해당 IP 인터페이스에서 서버가 대기합니다.
// 동일 포트로 여러 서버를 운영할 때 사용
//bind_ip: 127.0.0.1


// 캐릭터 서버 포트
char_port: 6121


// 맵 서버 IP (클라이언트가 접속할 주소)
// 외부에서 접속 가능한 공인 IP로 설정해야 합니다.
map_ip: 127.0.0.1


// 맵 서버 포트
map_port: 5121


// 콘솔 메시지 앞에 출력될 시간 포맷
// 최대 20자까지 가능
// 예시:
// %I:%M:%S %p → 12시간제 (AM/PM)
// %H:%M:%S → 24시간제
// %d/%b/%Y → 날짜
// 자세한 형식은 strftime() 참고
//timestamp_format: [%d/%b %H:%M]


// 콘솔 출력에 ANSI 색상 코드 포함 여부
stdout_with_ansisequence: no


// 콘솔 메시지를 파일로 기록할지 설정
// 1: 경고 로그
// 2: 오류 및 SQL 오류 로그
// 4: 디버그 로그
// 예: 7 → 모든 로그 기록
// console_silent보다 우선 적용됨
console_msg_log: 0


// 콘솔 로그 저장 경로
console_log_filepath: ./log/map-msg_log.log


// 콘솔 출력 숨김 설정
// 1: 정보 숨김
// 2: 상태 숨김
// 4: 공지 숨김
// 8: 경고 숨김
// 16: 오류 숨김
// 32: 디버그 숨김
// 예: 7 → 정보/상태/공지 숨김
console_silent: 0


// 데이터베이스 파일을 읽어올 경로
db_path: db


// @guildspy 및 @partyspy 명령어 활성화 여부
// 활성화 시 패킷 전송 성능이 저하될 수 있음
enable_spy: no


// 맵 데이터를 mapcache 대신 GRF 또는 data 폴더에서 읽을지 여부
// grf-files.txt 기준으로 참조
use_grf: no


// 콘솔 명령어 사용 여부
// >& log.file 같은 리다이렉션 사용 방지
console: off


// 데이터베이스 자동 저장 주기 (초)
// 예: 60초 + 60명 접속 → 1초마다 1명씩 저장
autosave_time: 300


// 최소 저장 간격 (밀리초)
// 너무 빠른 저장으로 인한 서버 부하 방지
minsave_time: 100


// autosave 외에도 캐릭터가 저장되는 상황 설정
// 필요에 따라 추가 가능:
// 1: 거래 완료 시
// 2: 상점 개설 및 거래 시
// 4: 창고/길드 창고 종료 시
// 8: 펫 부화/회수 시
// 16: 첨부파일 포함 메일 전송 시
// 32: 경매 등록 시
// 64: 퀘스트 완료/삭제/획득 시
// 128: 은행 입출금 시
// 256: 출석 보상 획득 시
// 4095: 항상 저장
//
// 주의:
// 값이 높을수록 아이템 복사/유실 위험은 줄지만
// 서버 부하 및 랙이 증가할 수 있음
save_settings: 4095


// 오늘의 메시지 파일 (로그인 시 표시)
motd_txt: conf/motd.txt


// GM이 @help 또는 @h 입력 시 표시되는 도움말
// 신규 GM 교육용
charhelp_txt: conf/charhelp.txt


// 채널 설정 파일 경로
channel_conf: conf/channels.conf


// 맵 설정 파일 로드
import: conf/maps_athena.conf

import: conf/import/map_conf.txt