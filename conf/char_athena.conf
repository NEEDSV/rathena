// Athena 캐릭터 설정 파일

// 참고: "주석"은 // 뒤에 있는 모든 텍스트를 의미합니다.
// 주석 처리된 내용은 서버에서 읽지 않으며,
// 단순한 설명/참고 용도로만 사용됩니다.


// 서버 통신용 사용자명과 비밀번호
userid: s1
passwd: p1


// 서버 이름 (공백 대신 ASCII 160 같은 특수 문자 사용 권장)
// 주의: 아래 문자들은 사용하지 마세요 (Windows 파일명 제한)
// \ / : * ? " < > |
// → 사용 시 길드 엠블럼이 클라이언트에서 정상 표시되지 않을 수 있습니다.
server_name: NEED


// 서버 위스퍼 이름 (서버 → 유저 귓속말용, 4~23자)
wisp_server_name: NEED


// 로그인 서버 IP
// 캐릭터 서버가 로그인 서버에 접속할 때 사용하는 IP
// 방화벽 환경 또는 멀티 네트워크 인터페이스 환경에서 유용합니다.
login_ip: 127.0.0.1


// 캐릭터 서버 바인딩 IP
// 해당 IP 인터페이스에서 서버가 대기합니다.
// 동일 포트로 여러 서버 운영 시 사용
//bind_ip: 127.0.0.1


// 로그인 서버 포트
login_port: 6900


// 캐릭터 서버 IP (클라이언트가 접속할 주소)
// 반드시 외부에서 접근 가능한 공인 IP로 설정해야 합니다.
char_ip: 127.0.0.1


// 캐릭터 서버 포트
char_port: 6121


// 콘솔 메시지 앞에 표시될 시간 포맷
// 최대 20자까지 가능
// 예시:
// %I:%M:%S %p → 12시간제
// %H:%M:%S → 24시간제
// %d/%b/%Y → 날짜
// 자세한 형식은 strftime() 참고
//timestamp_format: [%d/%b %H:%M]


// 콘솔 출력에 색상 코드(ANSI escape)를 포함할지 여부
stdout_with_ansisequence: no


// 콘솔 메시지를 파일로 저장할지 설정
// 1: 경고
// 2: 오류 및 SQL 오류
// 4: 디버그
// 예: 7 → 전부 저장
// console_silent보다 우선 적용됨
console_msg_log: 7


// 콘솔 로그 파일 경로
console_log_filepath: ./log/char-msg_log.log


// 콘솔 출력 제한 설정
// 1: 정보 숨김
// 2: 상태 숨김
// 4: 공지 숨김
// 8: 경고 숨김
// 16: 오류 숨김
// 32: 디버그 숨김
// 예: 7 → 정보/상태/공지 숨김
console_silent: 3


// 콘솔 명령어 사용 여부
// >& log.file 같은 리다이렉션 방지용
console: off


// 서버 타입 (현재 기능적 영향 없음)
// 클라이언트 서버 리스트에 표시됨
// 0: 일반, 1: 점검, 2: 18세 이상, 3: 유료, 4: P2P
char_maintenance: 0


// 신규 캐릭터 생성 허용 여부
char_new: yes


// 서버 목록에 "New" 표시 여부
char_new_display: 0


// 최대 접속 인원
// 0 → 접속 차단
// -1 → 무제한
max_connect_user: -1


// GM이 접속 제한 무시 가능한 그룹 ID
// 점검 모드에서도 접속 가능
// 기본값: -1 (해당 없음)
gm_allow_group: 99


// 길드 정보 저장 주기 (초)
autosave_time: 60


// 캐릭터/길드/파티 저장 시 콘솔 출력 여부
save_log: yes


// 캐릭터 시작 위치 설정
// 여러 개 지정 시 랜덤 선택
// 형식: map,x,y:map,x,y
// 최대 개수: 5
// Doram은 2015-10-01 이상 클라 필요
start_point: ra_temsky,99,8:ra_temsky,100,8:ra_temsky,100,9:ra_temsky,99,9


// 신규 캐릭터 시작 아이템
// 최대 32개
// 형식: id,수량,장착위치
// 장착 안할 경우 0
start_items: 1201,1,2:2301,1,16:23484,1,0


// 시작 제니
start_zeny: 0


// 명성 랭킹 크기
fame_list_alchemist: 10
fame_list_blacksmith: 10
fame_list_taekwon: 10


// 길드 경험치 배율
// 예: 200 → 2배
guild_exp_rate: 100


// 알 수 없는 캐릭터 이름 표시
unknown_char_name: Unknown


// 캐릭터 서버 로그 기록 여부
log_char: yes


// 캐릭터 이름 최소 길이
// 클라 패치 없으면 4 유지 필수
char_name_min_length: 4


// 대소문자 구분 없이 동일 이름 허용 여부
name_ignoring_case: no


// 캐릭터 이름 문자 제한 설정
// 0: 제한 없음
// 1: 허용 리스트만 사용
// 2: 금지 리스트만 제외
char_name_option: 0


// 허용 문자 리스트
char_name_letters: abcdefghijklmnopqrstuvwxyz ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890


// 캐릭터 삭제 제한 (레벨 기준)
// 0: 제한 없음
// -X: X 이하 삭제 불가
// Y: Y 이상 삭제 불가
char_del_level: 0


// 캐릭터 삭제 대기 시간 (초)
// 기본: 24시간
char_del_delay: 600


// 캐릭터 삭제 인증 방식
// 1: 이메일
// 2: 생년월일
// 3: 둘 다
char_del_option: 2


// 파티/길드 상태에서 삭제 제한
// 0: 없음
// 1: 파티
// 2: 길드
// 3: 둘 다
char_del_restriction: 3


// 파티 초기화 여부 (멤버 없는 경우)
clear_parties: no


// DB 폴더 경로
db_path: db


// ================================
// 핀코드 시스템
// ================================

// 캐릭터 선택 전 PIN 입력 기능
pincode_enabled: yes


// PIN 변경 주기 (일)
pincode_changetime: 0


// PIN 입력 실패 횟수 제한
pincode_maxtry: 3


// PIN 사용 강제 여부
pincode_force: yes


// 반복 숫자 허용 여부
pincode_allow_repeated: no


// 연속 숫자 허용 여부
pincode_allow_sequential: no


// ================================
// 애드온 시스템
// ================================

// 캐릭터 슬롯 이동 기능
char_move_enabled: yes


// 사용 중 슬롯으로 이동 허용 (자리 교환)
char_movetoused: yes


// 이동 횟수 제한
char_moves_unlimited: no


// 파티 상태에서 이름 변경 허용 여부
char_rename_party: no


// 길드 상태에서 이름 변경 허용 여부
char_rename_guild: no


// 서버 시작 시 DB 검사 여부
char_checkdb: yes


// 잘못된 맵 위치일 경우 이동할 기본 맵
default_map: prontera
default_map_x: 156
default_map_y: 191


// 비활성 클랜 멤버 자동 제거 (일)
clan_remove_inactive_days: 14


// ================================
// RODEX (메일 시스템)
// ================================

// 메일 반송 기간 (일)
mail_return_days: 15


// 반송 후 삭제 기간 (일)
mail_delete_days: 15


// 전체 수령 시 읽지 않은 메일 포함 여부
mail_retrieve: yes


// 첨부 없는 메일 반송 여부
mail_return_empty: yes


// 추가 설정 파일 로드
import: conf/import/char_conf.txt