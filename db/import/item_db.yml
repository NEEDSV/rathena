# 캐시 아이템
  - Id: 399990
    AegisName: Gold_Coin__
    Name: 금화
    Type: Usable
    Weight: 0
    Flags:
      BuyingStore: true
    Script: |
      .@left = countitem(399990); // 사용 후 남아있는 금화 개수
      .@amount = .@left + 1;      // 방금 사용한 1개 포함
      if (.@left > 0)
        delitem 399990, .@left;
      #CASHPOINTS += .@amount * 100;
      dispbottom "금화 " + .@amount + "개를 사용하여 " + (.@amount * 100) + "캐시를 획득했습니다.";
