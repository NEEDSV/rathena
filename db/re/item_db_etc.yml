    Name: ЙйИЃЙЎЦЎРЧ АсСЄ(Ш­ПА) Lv1
    Type: Card
    SubType: Enchant
    Script: |
      .@g = getenchantgrade();
      bonus2 bMagicAddEle,Ele_Dark,10;
      bonus2 bAddEle,Ele_Dark,10;
      bonus2 bMagicAddEle,Ele_Fire,10;
      bonus2 bAddEle,Ele_Fire,10;
      if (.@g>=ENCHANTGRADE_D) {
         bonus2 bAddEle,Ele_Dark,2;
         bonus2 bAddEle,Ele_Fire,2;
         bonus2 bMagicAddEle,Ele_Dark,2;
         bonus2 bMagicAddEle,Ele_Fire,2;
         if (.@g>=ENCHANTGRADE_C) {
            bonus2 bAddEle,Ele_Dark,2;
            bonus2 bAddEle,Ele_Fire,2;
            bonus2 bMagicAddEle,Ele_Dark,2;
            bonus2 bMagicAddEle,Ele_Fire,2;
            if (.@g>=ENCHANTGRADE_B) {
               bonus2 bAddEle,Ele_Dark,3;
               bonus2 bAddEle,Ele_Fire,3;
               bonus2 bMagicAddEle,Ele_Dark,3;
               bonus2 bMagicAddEle,Ele_Fire,3;
               if (.@g>=ENCHANTGRADE_A) {
                  bonus2 bAddEle,Ele_Dark,3;
                  bonus2 bAddEle,Ele_Fire,3;
                  bonus2 bMagicAddEle,Ele_Dark,3;
                  bonus2 bMagicAddEle,Ele_Fire,3;
               }
            }
         }
      }
